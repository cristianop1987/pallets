<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Inventário Pallets</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #bb86fc; --accent: #03dac6; --txt: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; font-weight: 300; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #aaa; }
        select, input { width: 100%; padding: 12px; margin-bottom: 1.2rem; border-radius: 6px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 6px; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        .status { text-align: center; margin-top: 1rem; font-size: 0.9rem; font-weight: bold; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gestão de Estoque</h2>
    <form id="palletForm" onsubmit="return false;">
        <label>MOVIMENTAÇÃO</label>
        <select id="tipo">
            <option value="ENTRADAS">ENTRADA (Adicionar à Base)</option>
            <option value="SAÍDAS">SAÍDA (Remover da Base)</option>
        </select>

        <label>ID DO PALLET</label>
        <input type="text" id="codigo" placeholder="Ex: PAG001234" required autofocus onkeydown="verificarEnter(event)">

        <button type="button" onclick="enviar()">REGISTRAR</button>
    </form>
    <div id="status" class="status"></div>
</div>

<script>
    // Função para detectar a tecla Enter
    function verificarEnter(event) {
        if (event.key === "Enter") {
            enviar();
        }
    }

    async function enviar() {
        // ATENÇÃO: COLOQUE SUA URL DE IMPLANTAÇÃO ABAIXO
        const urlScript = "https://script.google.com/macros/s/AKfycbw6tAmWFYaTgEv7U8vkis1HqVnIYWlC-AnZtoQwUgl3Avt_25xpsKkhJKEDJLpbs_Fn/exec"; 
        
        const status = document.getElementById('status');
        const codigoInput = document.getElementById('codigo');
        const tipo = document.getElementById('tipo').value;

        const codigoValor = codigoInput.value.trim().toUpperCase();

        if(!codigoValor) {
            status.style.color = "yellow";
            status.innerText = "Digite um código!";
            return;
        }

        status.style.color = "orange";
        status.innerText = "Processando estoque...";

        try {
            await fetch(urlScript, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ tipo: tipo, codigo: codigoValor })
            });
            
            status.style.color = "#03dac6";
            status.innerText = "Sucesso: " + codigoValor;
            codigoInput.value = "";
            codigoInput.focus();
        } catch (e) {
            status.style.color = "red";
            status.innerText = "Erro de conexão.";
        }
    }
</script>
</body>
</html>
