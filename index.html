<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo de Pallets - Operacional</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1.2rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #2c2c2c;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        .status {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Movimentação</h2>
    <form id="palletForm">
        <label>Operação</label>
        <select id="tipo">
            <option value="ENTRADAS">ENTRADA</option>
            <option value="SAÍDAS">SAÍDA</option>
        </select>

        <label>Código do Pallet</label>
        <input type="text" id="codigo" placeholder="Ex: PAG001234" required>

        <button type="button" onclick="enviarDados()">REGISTAR</button>
    </form>
    <div id="status" class="status"></div>
</div>

<script>
    async function enviarDados() {
        // SUBSTITUA pela URL que o Google vai te dar no final do processo de implantação
        const urlScript = "https://script.google.com/macros/s/AKfycbwz6ExVh9FegnVdgZ2swsdeTECoRAX57gnALKyxIcnUbyY9784G_NR604XjQRYiR0L2/exec"; 
        
        const statusDiv = document.getElementById('status');
        const codigoInput = document.getElementById('codigo');
        const tipoSelect = document.getElementById('tipo');

        const payload = {
            tipo: tipoSelect.value,
            codigo: codigoInput.value.trim().toUpperCase()
        };

        if(!payload.codigo) {
            statusDiv.innerText = "Por favor, digite o código.";
            return;
        }

        statusDiv.style.color = "orange";
        statusDiv.innerText = "A enviar...";

        try {
            await fetch(urlScript, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            
            statusDiv.style.color = "#03dac6";
            statusDiv.innerText = "Sucesso: " + payload.codigo;
            codigoInput.value = "";
        } catch (error) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "Erro ao conectar.";
        }
    }
</script>

</body>
</html>
